<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Key Runner — Typing Game (Phaser 3)</title>
  <link rel="icon" type="image/png" href="./assets/generated/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
  <!-- Phaser 3 (vendored via clint-engine — was cdnjs CDN 3.70.0, now the
       engine's pinned 3.90.0; offline-safe on filtered school networks). -->

</head>
<body>
  <div id="game"></div>
  <script type="module" src="./src/main.js"></script>
  <script>
window.addEventListener('error', e => {
  const pre = document.createElement('pre');
  pre.style.cssText='position:fixed;left:0;top:0;right:0;background:#300;color:#fff;padding:8px;margin:0;z-index:99999';
  pre.textContent = 'JS Error: ' + (e.message || e.error);
  document.body.prepend(pre);
});
</script>
</body>
</html>
